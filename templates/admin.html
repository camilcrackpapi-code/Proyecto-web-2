<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Cocina - La Cocina Deliciosa</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #1e2124; color: #fff; margin: 0; padding: 0; display: flex; }
        
        /* Barra lateral */
        .sidebar { width: 250px; background-color: #2c3e50; min-height: 100vh; padding: 20px; box-sizing: border-box; }
        .sidebar h2 { color: #f1c40f; margin-top: 0; font-size: 1.5em; border-bottom: 1px solid #444; padding-bottom: 15px; }
        .menu-lateral { list-style: none; padding: 0; }
        .menu-lateral li { padding: 15px 0; border-bottom: 1px solid #34495e; cursor: pointer; color: #aab8c2; }
        .menu-lateral li:hover, .menu-lateral li.activo { color: #fff; font-weight: bold; }

        /* Área principal de pedidos */
        .main-content { flex: 1; padding: 30px; }
        .header-panel { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #333; padding-bottom: 20px; margin-bottom: 30px; }
        .reloj { font-size: 1.2em; color: #aab8c2; }

        /* Grid de comandas */
        .ordenes-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; }
        
        /* Tarjeta de cada orden */
        .orden-card { background: #fff; color: #333; border-radius: 8px; padding: 20px; box-shadow: 0 4px 8px rgba(0,0,0,0.2); position: relative; border-top: 5px solid #e74c3c; }
        .orden-card.completada { border-top-color: #27ae60; opacity: 0.7; }
        .mesa-tag { position: absolute; top: -15px; right: 20px; background: #e74c3c; color: white; padding: 5px 15px; border-radius: 20px; font-weight: bold; font-size: 1.2em; }
        .cliente-info { font-size: 0.9em; color: #7f8c8d; margin-bottom: 15px; }
        .lista-platos { list-style: none; padding: 0; margin: 0 0 20px 0; font-size: 1.1em; font-weight: bold; }
        .lista-platos li { margin-bottom: 8px; border-bottom: 1px dashed #ccc; padding-bottom: 5px; display: flex; justify-content: space-between; }
        
        .btn-despachar { width: 100%; background: #27ae60; color: white; border: none; padding: 12px; border-radius: 5px; font-size: 1em; font-weight: bold; cursor: pointer; }
        .btn-despachar:hover { background: #219150; }
    </style>
</head>
<body>

    <!-- Sidebar de Navegación -->
    <div class="sidebar">
        <h2>Panel Admin</h2>
        <ul class="menu-lateral">
            <li class="activo">🔔 Órdenes Activas</li>
            <li>📊 Historial y Ventas</li>
            <li>⚙️ Configurar Menú</li>
            <li>🚪 Cerrar Sesión</li>
        </ul>
    </div>

    <!-- Contenido Principal -->
    <div class="main-content">
        <div class="header-panel">
            <h1>Monitor de Cocina (Comandas)</h1>
            <div class="reloj" id="reloj">Cargando hora...</div>
        </div>

        <!-- Contenedor donde aparecerán las órdenes mágicamente -->
        <div class="ordenes-grid" id="contenedorOrdenes">
            <!-- Las tarjetas se generan por JavaScript -->
        </div>
    </div>

    <script>

        // Array simulando las órdenes que llegan de la base de datos
        let ordenesPendientes = [
            { id: 1, mesa: "5", cliente: "Carlos Pérez", hora: "14:30", platos: [{nombre: "Hamburguesa Artesanal", cant: 2}, {nombre: "Limonada", cant: 2}] },
            { id: 2, mesa: "2", cliente: "Ana Gómez", hora: "14:32", platos: [{nombre: "Pasta Alfredo", cant: 1}] }
        ];

        // Función para pintar las órdenes en la pantalla
        function renderizarOrdenes() {
            const contenedor = document.getElementById('contenedorOrdenes');
            contenedor.innerHTML = ''; // Limpiar el contenedor

            ordenesPendientes.forEach(orden => {
                let itemsHTML = '';
                orden.platos.forEach(p => {
                    itemsHTML += `<li><span>${p.cant}x ${p.nombre}</span></li>`;
                });

                const tarjeta = `
                    <div class="orden-card" id="orden-${orden.id}">
                        <div class="mesa-tag">Mesa ${orden.mesa}</div>
                        <h3 style="margin-top: 0;">Orden #${orden.id}</h3>
                        <div class="cliente-info">👤 ${orden.cliente} | 🕒 ${orden.hora}</div>
                        <ul class="lista-platos">
                            ${itemsHTML}
                        </ul>
                        <button class="btn-despachar" onclick="despacharOrden(${orden.id})">Despachar Pedido ✓</button>
                    </div>
                `;
                contenedor.innerHTML += tarjeta;
            });
        }

        // Función al hacer clic en despachar
        function despacharOrden(id) {
            // Animación visual de completado
            const card = document.getElementById(`orden-${id}`);
            card.classList.add('completada');
            card.querySelector('.btn-despachar').innerText = "Completado";
            card.querySelector('.btn-despachar').disabled = true;
            card.querySelector('.btn-despachar').style.background = "#7f8c8d";
            
            // Aquí enviarías un fetch al backend para actualizar el estado en la base de datos.
            console.log(`Orden ${id} marcada como completada en la BD.`);
        }

        // Lógica de Polling: Preguntar al servidor cada 5 segundos si hay órdenes nuevas
        function buscarNuevasOrdenes() {
            // fetch('api/obtener_ordenes_activas.php')
            // .then(res => res.json())
            // .then(data => { ordenesPendientes = data; renderizarOrdenes(); });
            
            console.log("Buscando nuevas comandas...");
            renderizarOrdenes(); 
        }

        // Iniciar
        renderizarOrdenes();
        setInterval(buscarNuevasOrdenes, 5000); // Consulta al backend cada 5 segundos
    </script>
</body>
</html>
